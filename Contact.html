<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correspondence | Tristen C. Metsikassus</title>
    <link rel="stylesheet" href="style.css">
    <style>
        header { text-align: center; padding: 120px 20px 40px; }
        h1 { font-size: 3rem; margin-bottom: 10px; }
        .subtitle { color: var(--gold); font-family: 'Cinzel', serif; letter-spacing: 3px; font-size: 1rem; text-transform: uppercase; }

        .contact-container {
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: var(--gold);
            text-transform: uppercase;
        }

        input, textarea {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(138, 107, 34, 0.3);
            padding: 15px;
            color: #ffffff;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.4s ease;
        }

        input:focus, textarea:focus {
            border-color: var(--gold);
            background: rgba(138, 107, 34, 0.05);
            box-shadow: 0 0 15px rgba(138, 107, 34, 0.2);
        }

        .submit-btn {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 15px;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: var(--gold);
            color: #000000;
            box-shadow: 0 0 20px var(--gold);
        }

        /* Navigation Sync */
        nav { text-align: center; position: fixed; top: 0; width: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); padding: 20px 0; z-index: 100; border-bottom: 1px solid rgba(138, 107, 34, 0.2); }
        nav ul { list-style: none; padding: 0; margin: 0; }
        nav li { display: inline; margin: 0 25px; }
        nav a { font-family: 'Cinzel', serif; color: var(--subtext); text-decoration: none; font-weight: bold; letter-spacing: 2px; font-size: 0.9rem; }
        nav a:hover { color: var(--gold); }
    </style>
</head>
<body>

<nav>
    <ul>
        <li><a href="index.html">HOME</a></li>
        <li><a href="About.html">ABOUT</a></li>
        <li><a href="Books.html">BOOKS</a></li>
        <li><a href="Codex.html">CODEX</a></li>
        <li><a href="Art.html">ART</a></li>
        <li><a href="Contact.html">CONTACT</a></li>
    </ul>
</nav>

<header>
    <p class="subtitle">Institutional Correspondence</p>
    <h1>Transmission Registry</h1>
</header>

<div class="contact-container card wardline">
    <form class="contact-form">
        <div class="form-group">
            <label for="name">Identifier</label>
            <input type="text" id="name" placeholder="Enter name or designation..." required>
        </div>
        <div class="form-group">
            <label for="email">Access Point</label>
            <input type="email" id="email" placeholder="Return-path address..." required>
        </div>
        <div class="form-group">
            <label for="message">Transmission</label>
            <textarea id="message" rows="6" placeholder="Document your message here..." required></textarea>
        </div>
        <button type="submit" class="submit-btn">Send Transmission</button>
    </form>
</div>

<footer style="text-align: center; padding: 100px 40px; opacity: 0.4; font-size: 0.7rem; letter-spacing: 3px; font-family: 'Cinzel', serif;">
    [ SECURE TERMINAL // CONTACT ENCRYPTED ]
</footer>

</body>
</html>
